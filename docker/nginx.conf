# Static site + match listings (mirrors gemforest.servegame.com on :80/:443)
server {
    listen 80 default_server;
    server_name _;

    root /var/www/sparring;
    autoindex on;

    location = / {
        try_files /index.html =404;
    }

    # Recording files are stored already-gzipped. Mark them as such so the
    # browser transparently decompresses for fetch().text() / JSON.parse.
    # The rewrite strips the optional /matches/ prefix so the file resolves
    # against the server root /var/www/sparring.
    location ~ \.json\.gz$ {
        rewrite      ^/matches/(.*)$ /$1 break;
        types        { }
        default_type application/json;
        add_header   Content-Encoding gzip;
        gzip         off;
    }

    location /matches/ {
        alias /var/www/sparring/;
        autoindex on;
    }

    # Convenience: let users curl the client script from the local server
    location = /client.sh {
        alias /opt/sparring/client.sh;
        default_type text/plain;
    }
}

# Broker (mirrors gemforest.servegame.com:43500)
server {
    listen 43500 default_server;
    server_name _;

    client_max_body_size 1m;

    location = /join {
        fastcgi_pass unix:/run/fcgiwrap.sock;
        fastcgi_param SCRIPT_FILENAME /opt/sparring/fcgi_broker.sh;
        fastcgi_param QUERY_STRING    $query_string;
        fastcgi_param REQUEST_METHOD  $request_method;
        fastcgi_param CONTENT_TYPE    $content_type;
        fastcgi_param CONTENT_LENGTH  $content_length;
        fastcgi_param GATEWAY_INTERFACE CGI/1.1;
        fastcgi_param SERVER_PROTOCOL $server_protocol;
        fastcgi_param REMOTE_ADDR     $remote_addr;
        fastcgi_param SERVER_NAME     $server_name;
        fastcgi_param SERVER_PORT     $server_port;
        fastcgi_param REQUEST_URI     $request_uri;

        # Don't buffer the (possibly large) bot.yaml body to disk first
        fastcgi_request_buffering off;
        fastcgi_read_timeout 60s;
    }
}
